  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease, min-width 0.25s ease;
    z-index: 30;
  }

  #sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  #sidebar-header h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--text-bright);
  }
  #sidebar-header p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0;
  }
  #node-builder-sidebar {
    padding: 4px 9px;
    background: #d3d0ca;
    border: 1px solid var(--accent);
    border-radius: 3px;
    color: var(--accent);
    font-size: 10px;
    font-family: 'articulat-cf', sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    transition: background 0.15s;
  }
  #node-builder-sidebar:hover { background: #fff; }

  /* ── MAP MODE SWITCHER ── */
  #mode-switcher {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .mode-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0;
    margin-bottom: 2px;
  }

  .mode-btn-group {
    display: flex;
    gap: 4px;
  }

  .mode-btn {
    flex: 1;
    padding: 6px 8px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    font-family: var(--font);
    letter-spacing: 0;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    opacity: 0.45;
  }
  .mode-btn:hover { opacity: 0.75; }
  .mode-btn.active-analog,
  .mode-btn.active-digital,
  .mode-btn.active-split {
    background: rgba(81,84,240,0.15);
    border-color: var(--accent);
    color: var(--accent);
    opacity: 1;
  }

  #sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 0;
  }

  #sidebar-scroll::-webkit-scrollbar { width: 3px; }
  #sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
  #sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

  /* ── CONTROLS ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 18px 8px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .toggle-row:hover { background: var(--surface2); }
  .toggle-row span { font-size: 12px; color: var(--text); }

  .toggle {
    position: relative;
    width: 30px;
    height: 17px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border-hover);
    border-radius: 9px;
    transition: background 0.2s;
    cursor: pointer;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    left: 3px; top: 3px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before {
    transform: translateX(13px);
    background: #fff;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 10px 18px;
  }

  /* ── FILTER ACCORDION ── */
  .filter-group { border-bottom: 1px solid var(--border); }

  .filter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .filter-header:hover { background: var(--surface2); }

  .filter-header-name {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .filter-chevron {
    width: 14px; height: 14px;
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .filter-group.open .filter-chevron { transform: rotate(180deg); }

  .filter-active-count {
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 8px;
    padding: 1px 6px;
    margin-right: 6px;
    display: none;
  }
  .filter-active-count.visible { display: inline-block; }

  .filter-options {
    display: none;
    flex-direction: column;
    padding: 4px 0 10px;
    background: rgba(0,0,0,0.12);
  }
  .filter-group.open .filter-options { display: flex; }

  .filter-option {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 18px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .filter-option:hover { background: var(--surface2); }

  .filter-option input[type="checkbox"] {
    appearance: none;
    width: 13px; height: 13px;
    border: 1px solid var(--border-hover);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .filter-option input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .filter-option input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 1.5px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(40deg);
  }

  .filter-option label {
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    line-height: 1.4;
    letter-spacing: 0em;
  }

  #clear-filters {
    margin: 12px 18px 4px;
    padding: 7px 12px;
    background: transparent;
    border: 1px solid var(--border-hover);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 11px;
    font-family: var(--font);
    letter-spacing: 0;
    cursor: pointer;
    width: calc(100% - 36px);
    display: none;
  }
  #clear-filters:hover { border-color: var(--accent); color: var(--accent); }
  #clear-filters.visible { display: block; }

  /* ── MAP AREA ── */
  #map-area {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* ── SINGLE MAP PANE ── */
  .map-pane {
    position: relative;
    overflow: hidden;
    flex: 1;
    cursor: grab;
    transition: flex 0.3s ease;
  }
  .map-pane:active { cursor: grabbing; }

  /* Split divider */
  .split-divider {
    width: 1px;
    background: var(--border-hover);
    flex-shrink: 0;
    display: none;
    position: relative;
    z-index: 5;
  }
  body.mode-split .split-divider { display: block; }

  /* Pane label badges */
  .pane-label {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 12px;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  body.mode-split .pane-label { opacity: 1; }

  #pane-analog .pane-label {
    background: rgba(81,84,240,0.18);
    border: 1px solid rgba(81,84,240,0.35);
    color: #8b8ef5;
  }
  #pane-digital .pane-label {
    background: rgba(79,168,158,0.18);
    border: 1px solid rgba(79,168,158,0.35);

// ── FILTER DEFINITIONS ─────────────────────────────────────────────────────
const FILTERS = [
  { key: 'memory type',    label: 'Memory type',         options: ['Shared by a collective group, culture, or community','Shared between myself and specific others','Unsure','Personal and specific to me'] },
  { key: 'theme',          label: 'Memory content',      options: ['general','people','nature itself','outdoor activity','family trip'] },
  { key: 'time',           label: 'Life stage',          options: ['Young adulthood (ages 18-25)','Childhood (ages 0-12)','Ongoing (this is a recurring or continuous experience)','Adolescence (ages 13-18)'] },
  { key: 'residence',      label: 'Current resident',    options: ['No','Yes'] },
  { key: 'area',           label: 'Area of residence',   options: ['Mixed/unsure','Suburban (residential areas outside city centers)','Rural (countryside, farmland, small towns)','Urban (city center, dense downtown area)'] },
  { key: 'connection',     label: 'Sense of connection', options: ['My current self','My past self','My home','Specific people involved in the memory','A broader community','The place itself','A particular time in my life','Other'] },
  { key: 'transformation', label: 'Place transformation',options: ['No, it remains largely the same','Unsure','Yes, it has changed significantly','Yes, it no longer exists'] },
  { key: 'weather',        label: 'Role of weather',     options: ['It is a primary aspect of the memory','It is a secondary aspect of the memory','It enhances my emotional experience when recalling it','It triggers my memory','Weather or season plays no significant role','Unsure'] },
  { key: 'trigger',        label: 'Triggers',            options: ['people','places','physical objects','food or drink','weather','music','visual media','smells','interactions and conversations','textures','events','holidays','other'] },
];

// ── OVERLAY MAPS ────────────────────────────────────────────────────────────
const ANALOG_OVERLAY_MAP = {
  'Shared by a collective group, culture, or community': 'analog_community',
  'Shared between myself and specific others':           'analog_shared',
  'Personal and specific to me':                        'analog_personal',
  'Unsure':                                             'analog_mixed',
};
const DIGITAL_OVERLAY_MAP = {
  'Shared by a collective group, culture, or community': 'digital_community',
  'Shared between myself and specific others':           'digital_shared',
  'Personal and specific to me':                        'digital_personal',
  'Unsure':                                             'digital_mixed',
};
const ANALOG_HIDDEN_OVERLAYS  = ['analog_community','analog_shared','analog_personal','analog_mixed'];
const DIGITAL_HIDDEN_OVERLAYS = ['digital_community','digital_shared','digital_personal','digital_mixed'];

// ── SHARED STATE ──────────────────────────────────────────────────────────
const activeFilters = {};
let currentMode = 'split'; // 'analog' | 'digital' | 'split'

// ── CSV PARSE ──────────────────────────────────────────────────────────────
function parseCSV(raw) {
  const lines = raw.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').replace(/^"|"$/g, ''); });
    return obj;
  });
}

const data = parseCSV(RAW_CSV);
const byId = {};
data.forEach(d => { byId[d.orb_ID.trim()] = d; });

// Fields that are genuinely comma-separated multi-value
const MULTI_VALUE_FIELDS = new Set(['trigger', 'connection', 'weather', 'theme']);

function valuesFor(row, key) {
  if (!row) return [];
  const raw = (row[key] || '').trim();
  if (!raw) return [];
  if (MULTI_VALUE_FIELDS.has(key)) {
    return raw.split(',').map(s => s.trim()).filter(Boolean);
  }
  // Single-value field (may contain commas in the value itself)
  return [raw];
}

// ── PER-MAP STATE ─────────────────────────────────────────────────────────
function createMapController(prefix) {
  const isAnalog = prefix === 'analog';
  const OVERLAY_MAP     = isAnalog ? ANALOG_OVERLAY_MAP    : DIGITAL_OVERLAY_MAP;
  const HIDDEN_OVERLAYS = isAnalog ? ANALOG_HIDDEN_OVERLAYS : DIGITAL_HIDDEN_OVERLAYS;

  // Suffix-swap helper: 'analog_community' ↔ 'digital_community'
  function peerOverlayId(id) {
    return id.startsWith('analog_')
      ? id.replace('analog_', 'digital_')
      : id.replace('digital_', 'analog_');
  }

  const state = {
    orbs: [],
    activeNode: null,
    zoom: null,
    svgD3: null,
    _syncing: false, // prevents zoom echo-loop
  };

  let _peer = null; // set after both controllers are created

  const $ = id => document.getElementById(id);
  const wrapper     = $(`svg-wrapper-${prefix}`);
  const infoPanel   = $(`info-panel-${prefix}`);
  const infoSummary = $(`info-summary-${prefix}`);

  function getSvgEl()      { return wrapper ? wrapper.querySelector('svg') : null; }
  function getLayerEl(id)  { const s = getSvgEl(); return s ? s.getElementById(id) : null; }

  function setOverlay(name, visible) {
    const el = getLayerEl(name);
    if (el) el.style.display = visible ? '' : 'none';
  }
  function hideAllOverlays() {
    HIDDEN_OVERLAYS.forEach(id => setOverlay(id, false));
  }

  function orbMatchesFilters(orbId) {
    const row = byId[orbId];
    if (!row) return true;
    for (const [key, vals] of Object.entries(activeFilters)) {
      if (vals.size === 0) continue;
      const orbVals = valuesFor(row, key);
      if (![...vals].some(v => orbVals.includes(v))) return false;
    }
    return true;
  }

  function applyState() {
    if (state.activeNode) return;
    const hasFilters = Object.keys(activeFilters).length > 0;
    state.orbs.forEach(orbId => {
      const el = getLayerEl(orbId);
      if (!el) return;
      el.style.opacity = (!hasFilters || orbMatchesFilters(orbId)) ? '' : '0.2';
    });
  }

  function showInfo(orbId, row) {
    if (!row) return;
    infoSummary.textContent = row.summary || row.place || '—';
    infoPanel.classList.add('visible');
  }

  function selectNode(orbId) {
    clearNodeSelection(false);
    state.activeNode = orbId;
    const el = getLayerEl(orbId);
    if (el) {
      el.style.transform = 'scale(1.1)';
      el.style.filter = 'drop-shadow(0 0 6px rgba(255,255,255,0.55)) drop-shadow(0 0 12px rgba(255,255,255,0.25))';
    }
    hideAllOverlays();
    state.orbs.forEach(id => {
      if (id === orbId) return;
      const nodeEl = getLayerEl(id);
      if (nodeEl) nodeEl.style.opacity = '0.2';
    });
    // In split mode, dim all peer orbs too
    if (currentMode === 'split' && _peer) {
      _peer.getState().orbs.forEach(id => {
        const peerEl = _peer.getLayerEl(id);
        if (peerEl) peerEl.style.opacity = '0.2';
      });
    }
    showInfo(orbId, byId[orbId]);
  }

  function clearNodeSelection(doApply = true) {
    if (state.activeNode) {
      const prev = getLayerEl(state.activeNode);
      if (prev) { prev.style.transform = ''; prev.style.filter = ''; }
      state.activeNode = null;
    }
    hideAllOverlays();
    state.orbs.forEach(id => {
      const el = getLayerEl(id);
      if (el) { el.style.opacity = ''; el.style.filter = ''; }
    });
    // Restore peer orbs opacity in split mode
    if (currentMode === 'split' && _peer) {
      _peer.getState().orbs.forEach(id => {
        const peerEl = _peer.getLayerEl(id);
        if (peerEl) peerEl.style.opacity = '';
      });
    }
    infoPanel.classList.remove('visible');
    if (doApply) {
      applyState();
      // Restore connections overlay if toggle is still on
      if (document.getElementById('connections-toggle').checked) syncConnections();
    }
  }

  // ── PUBLIC: highlight a memory-type group (called directly or by peer sync) ──
  function highlightMemType(memType) {
    if (state.activeNode) return;
    hideAllOverlays();
    const overlayId = OVERLAY_MAP[memType];
    if (overlayId) setOverlay(overlayId, true);
    state.orbs.forEach(id => {
      const r = byId[id];
      const mt = r ? (r['memory type'] || '').trim() : '';
      const nodeEl = getLayerEl(id);
      if (nodeEl) nodeEl.style.opacity = mt === memType ? '' : '0.2';
    });
  }

  // ── PUBLIC: clear hover highlight (called directly or by peer sync) ──
  function clearHighlight() {
    if (state.activeNode) return;
    hideAllOverlays();
    state.orbs.forEach(id => {
      const nodeEl = getLayerEl(id);
      if (nodeEl) nodeEl.style.opacity = '';
    });
    applyState();
  }

  function setupNodeInteractions() {
    state.orbs.forEach(orbId => {
      const el = getLayerEl(orbId);
      if (!el) return;
      el.style.cursor = 'pointer';
      el.style.transformOrigin = 'center';
      el.style.transformBox = 'fill-box';

      el.addEventListener('mouseenter', () => {
        if (state.activeNode) return;
        if (document.getElementById('connections-toggle').checked) return;
        const row = byId[orbId];
        const memType = row ? (row['memory type'] || '').trim() : '';
        highlightMemType(memType);
        // Sync peer in split mode
        if (currentMode === 'split' && _peer) _peer.highlightMemType(memType);
      });

      el.addEventListener('mouseleave', () => {
        if (state.activeNode) return;
        if (document.getElementById('connections-toggle').checked) return;
        clearHighlight();
        // Sync peer in split mode
        if (currentMode === 'split' && _peer) _peer.clearHighlight();
      });

      el.addEventListener('click', e => {
        e.stopPropagation();
        // In split mode, clear any hover highlights on the peer pane first
        if (currentMode === 'split' && _peer) _peer.clearHighlight();
        state.activeNode === orbId ? clearNodeSelection() : selectNode(orbId);
      });
    });

    // Quotes layer hover
    const svgEl = getSvgEl();
    if (svgEl) {
      const quotesLayer = svgEl.getElementById(`${prefix}_quotes`);
      if (quotesLayer) {
        quotesLayer.querySelectorAll('*').forEach(el => {
          el.addEventListener('mouseenter', () => {
            el.setAttribute('data-orig-fill', el.getAttribute('fill') || '');
            el.setAttribute('fill', '#9AC993');
            el.style.cursor = 'default';
          });
          el.addEventListener('mouseleave', () => {
            const orig = el.getAttribute('data-orig-fill');
            if (orig) el.setAttribute('fill', orig);
            else el.removeAttribute('fill');
          });
        });
      }
    }

    // Click on pane background → clear selection
    wrapper.addEventListener('click', () => clearNodeSelection());
  }

  function initZoom(svgEl) {
    const SVG_W = 3640, SVG_H = 2600;

    const zoomGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    zoomGroup.id = `zoom-layer-${prefix}`;
    while (svgEl.firstChild) zoomGroup.appendChild(svgEl.firstChild);
    svgEl.appendChild(zoomGroup);

    function computeMinScale() {
      const cW = svgEl.clientWidth  || svgEl.parentElement.clientWidth;
      const cH = svgEl.clientHeight || svgEl.parentElement.clientHeight;
      const fitK   = Math.min(cW / SVG_W, cH / SVG_H);
      const coverK = Math.max(cW / SVG_W, cH / SVG_H);
      return coverK / fitK;
    }

    const zoom = d3.zoom()
      .scaleExtent([computeMinScale(), 50])
      .translateExtent([[0, 0], [SVG_W, SVG_H]])
      .on('zoom', event => {
        zoomGroup.setAttribute('transform', event.transform);
        // Mirror zoom to peer when in split mode, guard against echo
        if (currentMode === 'split' && _peer && !state._syncing) {
          const peerState = _peer.getState();
          if (peerState.svgD3 && peerState.zoom && !peerState._syncing) {
            peerState._syncing = true;
            peerState.svgD3.call(peerState.zoom.transform, event.transform);
            peerState._syncing = false;
          }
        }
      });

    const svgD3 = d3.select(svgEl);
    svgD3.call(zoom);
    svgD3.on('dblclick.zoom', null);

    state.zoom  = zoom;
    state.svgD3 = svgD3;

    $(`zoom-in-${prefix}`).addEventListener('click', () => {
      svgD3.transition().duration(250).call(zoom.scaleBy, 1.5);
    });
    $(`zoom-out-${prefix}`).addEventListener('click', () => {
      svgD3.transition().duration(250).call(zoom.scaleBy, 0.67);
    });
    $(`reset-zoom-${prefix}`).addEventListener('click', () => {
      svgD3.transition().duration(350).call(zoom.transform, d3.zoomIdentity);
    });
  }

  function loadSVG() {
    fetch(`${prefix.toUpperCase()}.svg`)
      .then(r => {
        if (!r.ok) throw new Error(`Could not load ${prefix.toUpperCase()}.svg (HTTP ${r.status})`);
        return r.text();
      })
      .then(svgText => {
        wrapper.innerHTML = svgText;
        const svgEl = wrapper.querySelector('svg');
        if (!svgEl) throw new Error(`No <svg> element found in ${prefix.toUpperCase()}.svg`);
        svgEl.style.width  = '100%';
        svgEl.style.height = '100%';

        HIDDEN_OVERLAYS.forEach(id => setOverlay(id, false));

        state.orbs = data
          .map(d => d.orb_ID.trim())
          .filter(id => id.startsWith(`${prefix}_`) && svgEl.getElementById(id));

        initZoom(svgEl);
        setupNodeInteractions();
      })
      .catch(err => {
        wrapper.innerHTML = `
          <div id="loading-${prefix}" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(212,207,200,0.45);font-size:12px;pointer-events:none;">
            <span style="color:#E24B4A;font-size:13px">Failed to load ${prefix.toUpperCase()}.svg</span>
            <span style="font-size:11px;opacity:0.5">${err.message}</span>
            <span style="font-size:11px;opacity:0.35;text-align:center;max-width:320px">
              Make sure ${prefix.toUpperCase()}.svg is in the same folder and you're running<br>
              a local server: <code>python3 -m http.server 8000</code>
            </span>
          </div>`;
      });
  }

  // Public API
  return {
    load: loadSVG,
    applyState,
    clearNodeSelection,
    hideAllOverlays,
    setOverlay,
    highlightMemType,
    clearHighlight,
    HIDDEN_OVERLAYS,
    getState: () => state,
    getLayerEl,
    setPeer: (peer) => { _peer = peer; },
  };
}

// ── INSTANTIATE MAPS ───────────────────────────────────────────────────────
const analogMap  = createMapController('analog');
const digitalMap = createMapController('digital');

// Wire up peer references for split-mode sync
analogMap.setPeer(digitalMap);
digitalMap.setPeer(analogMap);

analogMap.load();
digitalMap.load();

// ── MODE SWITCHER ─────────────────────────────────────────────────────────
const modeBtns = document.querySelectorAll('.mode-btn');

function setMode(mode) {
  currentMode = mode;
  document.body.className = document.body.className
    .replace(/\bmode-\S+/g, '')
    .trim();
  document.body.classList.add(`mode-${mode}`);
  if (document.body.classList.contains('sidebar-collapsed'))
    document.body.classList.add('sidebar-collapsed');

  modeBtns.forEach(btn => {
    btn.classList.remove('active-analog','active-digital','active-split');
    if (btn.dataset.mode === mode) {
      if (mode === 'analog')  btn.classList.add('active-analog');
      if (mode === 'digital') btn.classList.add('active-digital');
      if (mode === 'split')   btn.classList.add('active-split');
    }
  });

  // Update sidebar title + counts
  const h1 = document.querySelector('#sidebar-title');
  const subtitle = document.querySelector('#sidebar-subtitle');
  const analogCount = data.filter(d => d.orb_ID.trim().startsWith('analog_')).length;
  const digitalCount = data.filter(d => d.orb_ID.trim().startsWith('digital_')).length;
  if (mode === 'analog') {
    h1.textContent = `Analog Memory: ${analogCount}`;
    subtitle.textContent = 'Pacific Northwest';
  } else if (mode === 'digital') {
    h1.textContent = `Digital Memory: ${digitalCount}`;
    subtitle.textContent = 'Pacific Northwest';
  } else {
    h1.textContent = 'Memory Map';
    subtitle.textContent = `Analog: ${analogCount} · Digital: ${digitalCount}`;
  }

  // Re-sync basemap/connections toggles to both maps after layout change
  syncBasemap();
  syncConnections();
}

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// Initialize title/counts for default split mode
setMode('split');

// ── BASEMAP + QUOTES TOGGLE ────────────────────────────────────────────────
function syncBasemap() {
  const vis = document.getElementById('basemap-toggle').checked ? '' : '0';
  ['analog','digital'].forEach(prefix => {
    const svgEl = document.querySelector(`#svg-wrapper-${prefix} svg`);
    if (!svgEl) return;
    const bm = svgEl.getElementById(`${prefix}_basemap`);
    const qt = svgEl.getElementById(`${prefix}_quotes`);
    if (bm) bm.style.opacity = vis;
    if (qt) qt.style.opacity = vis;
  });
}

function syncConnections() {
  const on = document.getElementById('connections-toggle').checked;
  [
    { map: analogMap,  overlays: ANALOG_HIDDEN_OVERLAYS  },
    { map: digitalMap, overlays: DIGITAL_HIDDEN_OVERLAYS },
  ].forEach(({ map, overlays }) => {
    if (on) overlays.forEach(id => map.setOverlay(id, true));
    else    map.hideAllOverlays();
  });
}

document.getElementById('basemap-toggle').addEventListener('change', syncBasemap);
document.getElementById('connections-toggle').addEventListener('change', syncConnections);

// ── FILTER UI ─────────────────────────────────────────────────────────────
const filterContainer = document.getElementById('filter-groups');

FILTERS.forEach(f => {
  const group = document.createElement('div');
  group.className = 'filter-group';

  const countId = `count-${f.key.replace(/\s/g, '_')}`;
  const header = document.createElement('div');
  header.className = 'filter-header';
  header.innerHTML = `
    <span class="filter-header-name">${f.label}</span>
    <span class="filter-active-count" id="${countId}">0</span>
    <svg class="filter-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M4 6l4 4 4-4"/>
    </svg>`;
  header.addEventListener('click', () => group.classList.toggle('open'));

  const opts = document.createElement('div');
  opts.className = 'filter-options';

  f.options.forEach(opt => {
    const row = document.createElement('label');
    row.className = 'filter-option';
    const cbId = `chk-${f.key.replace(/\s/g, '_')}-${opt.replace(/\W/g, '_')}`;
    row.innerHTML = `<input type="checkbox" id="${cbId}" data-key="${f.key}" data-val="${opt}"><label for="${cbId}">${opt}</label>`;
    row.querySelector('input').addEventListener('change', onFilterChange);
    opts.appendChild(row);
  });

  group.appendChild(header);
  group.appendChild(opts);
  filterContainer.appendChild(group);
});

function onFilterChange(e) {
  const { key, val } = e.target.dataset;
  if (!activeFilters[key]) activeFilters[key] = new Set();
  if (e.target.checked) activeFilters[key].add(val);
  else activeFilters[key].delete(val);
  if (activeFilters[key].size === 0) delete activeFilters[key];
  updateFilterUI();
  analogMap.applyState();
  digitalMap.applyState();
}

function updateFilterUI() {
  const hasAny = Object.keys(activeFilters).length > 0;
  document.getElementById('clear-filters').classList.toggle('visible', hasAny);

  FILTERS.forEach(f => {
    const el = document.getElementById(`count-${f.key.replace(/\s/g, '_')}`);
    if (!el) return;
    const count = activeFilters[f.key] ? activeFilters[f.key].size : 0;
    el.textContent = count;
    el.classList.toggle('visible', count > 0);
  });

  // Update active tags on both panes
  ['analog','digital'].forEach(prefix => {
    const tagsEl = document.getElementById(`active-tags-${prefix}`);
    if (!tagsEl) return;
    tagsEl.innerHTML = '';
    Object.entries(activeFilters).forEach(([, vals]) => {
      vals.forEach(v => {
        const tag = document.createElement('span');
        tag.className = 'active-tag';
        tag.textContent = v.length > 28 ? v.slice(0, 26) + '…' : v;
        tagsEl.appendChild(tag);
      });
    });
  });
}

document.getElementById('clear-filters').addEventListener('click', () => {
  document.querySelectorAll('.filter-option input[type="checkbox"]').forEach(c => c.checked = false);
  Object.keys(activeFilters).forEach(k => delete activeFilters[k]);
  updateFilterUI();
  analogMap.applyState();
  digitalMap.applyState();
});

// ── SIDEBAR COLLAPSE ───────────────────────────────────────────────────────
document.getElementById('sidebar-collapse').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('collapsed');
  document.body.classList.add('sidebar-collapsed');
});
document.getElementById('sidebar-restore').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('collapsed');
  document.body.classList.remove('sidebar-collapsed');
});

</script>
